name: No stale root dirs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if /client or /server exist at repo root
        run: |
          if [ -d client ] || [ -d server ]; then
            echo "::error::Found a root-level /client or /server directory. The canonical app code lives under store-app/client and store-app/server — merge any changes there and delete the root-level copy."
            exit 1
          fi
